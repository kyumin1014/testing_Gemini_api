<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시간 복잡도 분석기</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500;600&family=Google+Sans+Mono&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <header class="header">
        <div class="logo">
            <div class="logo-icon">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                    <path d="M14 2C7.373 2 2 7.373 2 14s5.373 12 12 12 12-5.373 12-12S20.627 2 14 2z"
                        fill="url(#grad1)" />
                    <path d="M9 14l3.5 3.5L19 10" stroke="white" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <defs>
                        <linearGradient id="grad1" x1="2" y1="2" x2="26" y2="26" gradientUnits="userSpaceOnUse">
                            <stop offset="0%" stop-color="#4285F4" />
                            <stop offset="50%" stop-color="#9B59B6" />
                            <stop offset="100%" stop-color="#EA4335" />
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <span class="logo-text">Complexity<span class="logo-accent">AI</span></span>
        </div>
        <nav class="nav-pills">
            <span class="nav-pill active">분석기</span>
            <span class="nav-pill">히스토리</span>
            <span class="nav-pill">도움말</span>
        </nav>
    </header>

    <main class="main" id="mainContent">
        <section class="hero">
            <div class="hero-badge">
                <span class="badge-dot"></span>
                Gemini AI 기반 분석
            </div>
            <h1 class="hero-title">
                코드의 시간 복잡도를<br>
                <span class="gradient-text">단숨에 파악하세요</span>
            </h1>
            <p class="hero-subtitle">
                코드를 붙여넣으면 AI가 Big-O 표기법으로<br>정밀하게 분석해드립니다
            </p>
        </section>

        <div class="workspace" id="workspace">
            <!-- Left panel: code editor -->
            <div class="panel-left">
                <div class="analyzer-card">
                    <div class="card-header">
                        <div class="card-header-left">
                            <div class="lang-selector">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <polyline points="16 18 22 12 16 6" />
                                    <polyline points="8 6 2 12 8 18" />
                                </svg>
                                <select id="langSelect">
                                    <option value="python">Python</option>
                                    <option value="java">Java</option>
                                    <option value="javascript">JavaScript</option>
                                    <option value="cpp">C++</option>
                                    <option value="c">C</option>
                                </select>
                            </div>
                        </div>
                        <div class="card-header-right">
                            <button class="icon-btn" onclick="clearCode()" title="초기화">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <polyline points="1 4 1 10 7 10" />
                                    <path d="M3.51 15a9 9 0 1 0 .49-3.51" />
                                </svg>
                            </button>
                            <button class="icon-btn" onclick="copyCode()" title="복사">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <rect x="9" y="9" width="13" height="13" rx="2" />
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="editor-wrapper">
                        <div class="line-numbers" id="lineNumbers">1</div>
                        <textarea id="codeInput"
                            placeholder="# 분석할 코드를 여기에 입력하세요...&#10;&#10;def example(arr):&#10;    for i in arr:&#10;        print(i)"
                            spellcheck="false" oninput="updateLineNumbers()"></textarea>
                    </div>

                    <div class="card-footer">
                        <div class="char-count">
                            <span id="charCount">0</span> 자
                        </div>
                        <button class="analyze-btn" id="analyzeBtn" onclick="analyzeCode()">
                            <span class="btn-content">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <circle cx="11" cy="11" r="8" />
                                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                                </svg>
                                분석하기
                            </span>
                            <div class="btn-shimmer"></div>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right panel: loading + result -->
            <div class="panel-right">
                <div class="loading-container" id="loadingContainer">
                    <div class="loading-card">
                        <div class="gemini-loader">
                            <div class="loader-ring"></div>
                            <div class="loader-ring"></div>
                            <div class="loader-ring"></div>
                            <div class="loader-core"></div>
                        </div>
                        <p class="loading-text">AI가 코드를 분석하고 있어요</p>
                        <p class="loading-sub">잠시만 기다려주세요...</p>
                    </div>
                </div>

                <div class="result-container" id="resultContainer">
                    <div class="result-header">
                        <div class="result-title">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M12 2L2 7l10 5 10-5-10-5z" />
                                <path d="M2 17l10 5 10-5" />
                                <path d="M2 12l10 5 10-5" />
                            </svg>
                            분석 결과
                        </div>
                        <div class="result-header-right">
                            <div class="complexity-badge" id="complexityBadge"></div>
                            <button class="icon-btn close-btn" onclick="resetAll()" title="닫기">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <line x1="18" y1="6" x2="6" y2="18" />
                                    <line x1="6" y1="6" x2="18" y2="18" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="result-body" id="resultBox"></div>
                    <div class="result-footer">
                        <button class="secondary-btn" onclick="copyResult()">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" />
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                            </svg>
                            결과 복사
                        </button>
                        <button class="secondary-btn" onclick="resetAll()">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polyline points="1 4 1 10 7 10" />
                                <path d="M3.51 15a9 9 0 1 0 .49-3.51" />
                            </svg>
                            처음으로
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
